name: Package image

on:
  workflow_dispatch:
    inputs:
      firsttrace_version:
        description: FirstTrace npm version or dist-tag to install.
        required: true
        default: 0.1.2
      config_file:
        description: Config file in the repository checkout to copy into the image.
        required: true
        default: firsttrace.wallspace.config.yaml
      repos_dir:
        description: Optional repository snapshot directory to copy to /app/repos.
        required: true
        default: repos
      image_tag:
        description: Additional image tag to publish.
        required: true
        default: latest

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Build package OCI image
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Verify npm package exists
        run: npm view "firsttrace@${{ inputs.firsttrace_version }}" version

      - name: Verify packaged Slack renderer
        run: |
          mkdir -p /tmp/firsttrace-package
          npm pack "firsttrace@${{ inputs.firsttrace_version }}" --pack-destination /tmp/firsttrace-package
          tar -xzf /tmp/firsttrace-package/firsttrace-*.tgz -C /tmp/firsttrace-package
          grep -q 'Likely owner' /tmp/firsttrace-package/package/dist/src/chat/slack/render.js
          grep -q 'Primary files' /tmp/firsttrace-package/package/dist/src/chat/slack/render.js
          ! grep -q 'Best fault-location lead' /tmp/firsttrace-package/package/dist/src/chat/slack/render.js
          ! grep -q 'Likely component' /tmp/firsttrace-package/package/dist/src/chat/slack/render.js

      - name: Verify config file exists
        run: test -f "${{ inputs.config_file }}"

      - name: Prepare repository snapshot directory
        run: |
          repos_dir="${{ inputs.repos_dir }}"
          if [[ ! -d "${repos_dir}" ]]; then
            repos_dir=".firsttrace-empty-repos"
            rm -rf "${repos_dir}"
            mkdir -p "${repos_dir}"
            touch "${repos_dir}/.keep"
          fi
          echo "FIRSTTRACE_REPOS_DIR=${repos_dir}" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/oci/Dockerfile.package
          platforms: linux/amd64
          push: true
          provenance: false
          tags: |
            ghcr.io/${{ github.repository_owner }}/firsttrace:${{ inputs.image_tag }}
            ghcr.io/${{ github.repository_owner }}/firsttrace:firsttrace-${{ inputs.firsttrace_version }}
            ghcr.io/${{ github.repository_owner }}/firsttrace:package-${{ github.run_number }}
          build-args: |
            FIRSTTRACE_PACKAGE_SPEC=firsttrace@${{ inputs.firsttrace_version }}
            FIRSTTRACE_CONFIG_FILE=${{ inputs.config_file }}
            FIRSTTRACE_CONFIG_DEST=firsttrace.wallspace.config.yaml
            FIRSTTRACE_REPOS_DIR=${{ env.FIRSTTRACE_REPOS_DIR }}
            FIRSTTRACE_BUILD_REF=npm:firsttrace@${{ inputs.firsttrace_version }}:${{ github.sha }}
