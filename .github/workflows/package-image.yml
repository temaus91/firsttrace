name: Package image

on:
  workflow_dispatch:
  push:
    branches:
      - codex/backend-investigator-quality-loop
    paths:
      - .github/workflows/package-image.yml
      - deploy/oci/Dockerfile.package
      - firsttrace.wallspace.config.yaml
      - package-lock.json
      - package.json
      - src/**
      - tsconfig.json

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Build package OCI image
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build package tarball
        run: npm pack

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/oci/Dockerfile.package
          platforms: linux/amd64
          push: true
          provenance: false
          tags: |
            ghcr.io/${{ github.repository_owner }}/firsttrace:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/firsttrace:package-${{ github.run_number }}
          build-args: |
            FIRSTTRACE_PACKAGE_TARBALL=firsttrace-0.1.0.tgz
            FIRSTTRACE_CONFIG_FILE=firsttrace.wallspace.config.yaml
            FIRSTTRACE_CONFIG_DEST=firsttrace.wallspace.config.yaml
